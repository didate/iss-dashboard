services:
  backend:
    build: ./backend
    volumes:
      - iss-data:/data
    env_file: .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iss-api.rule=Host(`apps.sante.gov.gn`) && PathPrefix(`/iss/api`)"
      - "traefik.http.routers.iss-api.entrypoints=didate_secure"
      - "traefik.http.routers.iss-api.tls.certresolver=didate"
      - "traefik.http.middlewares.iss-api-strip.stripprefix.prefixes=/iss"
      - "traefik.http.routers.iss-api.middlewares=iss-api-strip"
      - "traefik.http.routers.iss-api.priority=100"
      - "traefik.http.services.iss-api.loadbalancer.server.port=8080"
    networks:
      - traefik-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://apps.sante.gov.gn/iss}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iss-front.rule=Host(`apps.sante.gov.gn`) && PathPrefix(`/iss`)"
      - "traefik.http.routers.iss-front.entrypoints=didate_secure"
      - "traefik.http.routers.iss-front.tls.certresolver=didate"
      - "traefik.http.middlewares.iss-front-strip.stripprefix.prefixes=/iss"
      - "traefik.http.routers.iss-front.middlewares=iss-front-strip"
      - "traefik.http.routers.iss-front.priority=10"
      - "traefik.http.services.iss-front.loadbalancer.server.port=80"
    networks:
      - traefik-net

volumes:
  iss-data:

networks:
  traefik-net:
    external: true
