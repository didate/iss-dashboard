services:
  backend:
    build: ./backend
    volumes:
      - iss-data:/data
    env_file: .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iss-api.rule=Host(`api.iss.example.com`)"
      - "traefik.http.routers.iss-api.entrypoints=websecure"
      - "traefik.http.routers.iss-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.iss-api.loadbalancer.server.port=8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iss-front.rule=Host(`iss.example.com`)"
      - "traefik.http.routers.iss-front.entrypoints=websecure"
      - "traefik.http.routers.iss-front.tls.certresolver=letsencrypt"
      - "traefik.http.services.iss-front.loadbalancer.server.port=80"

volumes:
  iss-data:
