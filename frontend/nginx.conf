server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /iss/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /iss/index.html;
    }

    location /iss {
        return 301 /iss/;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
